<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Your Protocol!</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0e;
    --bg2: #0a1520;
    --bg3: #0f1e2e;
    --border: #1a3a52;
    --border2: #0e6e6e;
    --text: #c8e8f0;
    --muted: #5a8a9f;
    --accent: #00e5ff;
    --accent2: #00ff9d;
    --accent3: #ff6b35;
    --warn: #ffcc00;
    --danger: #ff4444;
    --glow: rgba(0,229,255,0.15);
    --panel: rgba(10,21,32,0.95);
    --scanline: rgba(0,229,255,0.03);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scanline) 2px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Starfield background */
  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .app-wrapper {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px 40px;
  }

  /* ── HEADER ─────────────────────────────────── */
  .header {
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .logo-tag {
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .logo-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.5), 0 0 40px rgba(0,229,255,0.2);
    letter-spacing: 2px;
    line-height: 1;
  }

  .logo-title span {
    color: var(--accent2);
    text-shadow: 0 0 20px rgba(0,255,157,0.5);
  }

  .header-stats {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stat-pill .val {
    color: var(--accent);
    font-weight: 500;
    font-size: 13px;
  }

  /* ── NAV GRID ────────────────────────────────── */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 28px;
  }

  .nav-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 8px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
    text-align: center;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }

  .nav-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform 0.2s;
  }

  .nav-btn:hover, .nav-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(0,229,255,0.05);
    box-shadow: 0 0 12px rgba(0,229,255,0.1);
  }

  .nav-btn:hover::after, .nav-btn.active::after {
    transform: scaleX(1);
  }

  .nav-btn.active {
    background: rgba(0,229,255,0.08);
  }

  .nav-btn .layer-tag {
    display: block;
    font-size: 9px;
    color: var(--accent3);
    margin-bottom: 3px;
    opacity: 0.8;
  }

  /* ── MAIN LAYOUT ─────────────────────────────── */
  .main-layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 16px;
    align-items: start;
  }

  @media (max-width: 800px) {
    .main-layout { grid-template-columns: 1fr; }
  }

  /* ── PANELS ──────────────────────────────────── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .panel-head {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .panel-head .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    flex-shrink: 0;
  }

  .panel-body {
    padding: 16px;
  }

  /* ── PROTOCOL INFO CARD ──────────────────────── */
  .proto-header {
    margin-bottom: 20px;
  }

  .proto-name {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 12px rgba(0,229,255,0.4);
    margin-bottom: 4px;
  }

  .proto-full {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .proto-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .badge {
    padding: 3px 10px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .badge-layer { background: rgba(255,107,53,0.15); color: var(--accent3); border: 1px solid rgba(255,107,53,0.3); }
  .badge-port  { background: rgba(0,229,255,0.1);   color: var(--accent);  border: 1px solid rgba(0,229,255,0.2); }
  .badge-sec   { background: rgba(0,255,157,0.1);   color: var(--accent2); border: 1px solid rgba(0,255,157,0.2); }
  .badge-warn  { background: rgba(255,204,0,0.1);   color: var(--warn);    border: 1px solid rgba(255,204,0,0.2); }
  .badge-danger{ background: rgba(255,68,68,0.1);   color: var(--danger);  border: 1px solid rgba(255,68,68,0.2); }

  .proto-desc {
    color: var(--text);
    font-size: 13px;
    line-height: 1.8;
    opacity: 0.9;
    margin-bottom: 16px;
  }

  /* ── TABS ────────────────────────────────────── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
    gap: 0;
  }

  .tab {
    padding: 8px 16px;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    background: none;
    border-left: none; border-right: none; border-top: none;
    font-family: 'IBM Plex Mono', monospace;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── PACKET VISUALIZER ───────────────────────── */
  .packet-viz {
    margin-bottom: 24px;
  }

  .packet-row {
    display: flex;
    width: 100%;
    border: 1px solid var(--border2);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .pkt-field {
    border-right: 1px solid var(--border);
    padding: 8px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .pkt-field:last-child { border-right: none; }

  .pkt-field:hover {
    background: rgba(0,229,255,0.1) !important;
    z-index: 2;
  }

  .pkt-field.active {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
    background: rgba(0,229,255,0.12) !important;
  }

  .pkt-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    display: block;
    margin-bottom: 3px;
  }

  .pkt-bits {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    display: block;
  }

  /* ── FIELD DETAIL ────────────────────────────── */
  .field-detail {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-left: 3px solid var(--accent);
    padding: 12px 14px;
    border-radius: 3px;
    margin-bottom: 20px;
    min-height: 80px;
    transition: all 0.3s;
  }

  .field-detail h4 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .field-detail p {
    font-size: 12px;
    color: var(--text);
    opacity: 0.85;
    line-height: 1.7;
  }

  /* ── HANDSHAKE ANIMATOR ──────────────────────── */
  .handshake-wrap {
    position: relative;
    width: 100%;
    overflow: hidden;
  }

  .handshake-svg {
    width: 100%;
    height: auto;
  }

  .hs-step {
    display: none;
  }

  .hs-step.visible {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: none; } }
  @keyframes packetTravel { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: none; } }
  @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  .step-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }

  .btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 16px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.05);
  }

  .btn:active { transform: scale(0.97); }

  .btn-accent {
    background: rgba(0,229,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .step-counter {
    font-size: 11px;
    color: var(--muted);
    flex: 1;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── QUIZ ────────────────────────────────────── */
  .quiz-question {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.7;
    padding: 14px;
    background: var(--bg3);
    border-left: 3px solid var(--accent3);
    border-radius: 2px;
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  .quiz-opt {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    text-align: left;
    transition: all 0.2s;
    border-radius: 2px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .quiz-opt span.key {
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    flex-shrink: 0;
    width: 18px;
  }

  .quiz-opt:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,229,255,0.05);
  }

  .quiz-opt.correct { border-color: var(--accent2); color: var(--accent2); background: rgba(0,255,157,0.07); }
  .quiz-opt.wrong   { border-color: var(--danger);  color: var(--danger);  background: rgba(255,68,68,0.07); }

  .quiz-feedback {
    padding: 12px 14px;
    border-radius: 2px;
    font-size: 12px;
    line-height: 1.7;
    display: none;
    margin-bottom: 12px;
  }

  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok  { background: rgba(0,255,157,0.08); border: 1px solid rgba(0,255,157,0.25); color: var(--accent2); }
  .quiz-feedback.bad { background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.25); color: var(--danger); }

  /* ── OSI SIDEBAR ─────────────────────────────── */
  .osi-stack {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .osi-layer {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .osi-layer::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    transition: background 0.2s;
  }

  .osi-layer:hover::before, .osi-layer.active::before {
    background: var(--accent);
  }

  .osi-layer.active {
    border-color: var(--accent);
    background: rgba(0,229,255,0.05);
  }

  .osi-num {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    width: 18px;
    flex-shrink: 0;
  }

  .osi-layer.active .osi-num { color: var(--accent); }

  .osi-name {
    font-size: 12px;
    color: var(--text);
    font-weight: 400;
  }

  .osi-protos {
    margin-left: auto;
    font-size: 10px;
    color: var(--muted);
    opacity: 0.7;
  }

  /* ── COMPARE TABLE ───────────────────────────── */
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-bottom: 16px;
  }

  .compare-table th {
    background: var(--bg3);
    padding: 8px 12px;
    text-align: left;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  .compare-table td {
    padding: 9px 12px;
    border-bottom: 1px solid rgba(26,58,82,0.5);
    color: var(--text);
    vertical-align: top;
  }

  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table tr:hover td { background: rgba(0,229,255,0.03); }

  .compare-table td:first-child {
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    white-space: nowrap;
  }

  /* ── TERMINAL LOG ────────────────────────────── */
  .terminal {
    background: #020810;
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .terminal .line {
    margin-bottom: 3px;
    animation: fadeIn 0.3s ease;
  }

  .terminal .t-time { color: var(--muted); }
  .terminal .t-send { color: var(--accent); }
  .terminal .t-recv { color: var(--accent2); }
  .terminal .t-err  { color: var(--danger); }
  .terminal .t-note { color: var(--warn); }

  /* ── SCROLLBAR ───────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── CURSOR blink ────────────────────────────── */
  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--accent);
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
  }

  /* ── SEARCH ──────────────────────────────────── */
  .search-bar {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    border-radius: 3px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar:focus { border-color: var(--accent); }
  .search-bar::placeholder { color: var(--muted); }

  /* ── PROGRESS ────────────────────────────────── */
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* ── ATTACK VECTORS ──────────────────────────── */
  .attack-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .attack-card {
    background: var(--bg3);
    border: 1px solid rgba(255,68,68,0.2);
    border-radius: 3px;
    padding: 10px 12px;
  }

  .attack-name {
    font-size: 11px;
    color: var(--danger);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .attack-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* ── FLOW DIAGRAM ────────────────────────────── */
  .flow-container {
    width: 100%;
    overflow-x: auto;
    margin-bottom: 16px;
  }

  svg.flow-svg {
    display: block;
    min-width: 560px;
  }

  /* Animations for SVG elements */
  @keyframes dash-move {
    to { stroke-dashoffset: -30; }
  }

  .animated-arrow {
    stroke-dasharray: 8 4;
    animation: dash-move 1.5s linear infinite;
  }

  /* ── TOOLTIP ─────────────────────────────────── */
  .tooltip {
    position: fixed;
    background: var(--bg2);
    border: 1px solid var(--border2);
    padding: 8px 12px;
    border-radius: 3px;
    font-size: 11px;
    color: var(--text);
    pointer-events: none;
    z-index: 10000;
    max-width: 200px;
    opacity: 0;
    transition: opacity 0.2s;
    line-height: 1.5;
  }
  .tooltip.show { opacity: 1; }

</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="tooltip" id="tooltip"></div>

<div class="app-wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <span class="logo-tag">// Network Intelligence Lab</span>
      <h1 class="logo-title">Learn Your <span>Protocol!</span><span class="cursor"></span></h1>
    </div>
    <div class="header-stats">
      <div class="stat-pill">Protocols <span class="val" id="proto-count">14</span></div>
      <div class="stat-pill">Score <span class="val" id="score-display">0</span></div>
      <div class="stat-pill">OSI Layers <span class="val">7</span></div>
    </div>
  </div>

  <!-- SEARCH -->
  <input class="search-bar" id="search-bar" placeholder="// search protocol, port, layer..." autocomplete="off">

  <!-- NAV GRID -->
  <div class="nav-grid" id="nav-grid"></div>

  <!-- MAIN LAYOUT -->
  <div class="main-layout">

    <!-- LEFT: OSI + Protocol List -->
    <div>
      <div class="panel" style="margin-bottom:16px">
        <div class="panel-head"><span class="dot"></span> OSI Stack</div>
        <div class="panel-body" style="padding:12px">
          <div class="osi-stack" id="osi-stack"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><span class="dot"></span> Terminal Log</div>
        <div class="terminal" id="terminal-log">
          <div class="line"><span class="t-time">[00:00:00]</span> <span class="t-note">System ready.</span></div>
          <div class="line"><span class="t-time">[00:00:00]</span> <span class="t-send">SELECT protocol to begin analysis.</span></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Protocol Detail -->
    <div class="panel" id="detail-panel">
      <div class="panel-head"><span class="dot"></span> <span id="detail-title">Select a Protocol</span></div>
      <div class="panel-body" id="detail-body">
        <div style="text-align:center;padding:60px 20px;color:var(--muted)">
          <div style="font-family:'Orbitron',monospace;font-size:40px;opacity:0.1;margin-bottom:16px">?</div>
          <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase">Select a protocol from the nav grid above</div>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────
// STARFIELD
// ─────────────────────────────────────────────────────────────────────
(function() {
  const c = document.getElementById('starfield');
  const ctx = c.getContext('2d');
  let W, H, stars = [];
  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 120; i++) {
    stars.push({ x: Math.random()*2-1, y: Math.random()*2-1, z: Math.random() });
  }
  function tick() {
    ctx.clearRect(0,0,W,H);
    const cx = W/2, cy = H/2;
    stars.forEach(s => {
      s.z -= 0.0015;
      if (s.z <= 0) { s.z = 1; s.x = Math.random()*2-1; s.y = Math.random()*2-1; }
      const px = (s.x / s.z) * W/2 + cx;
      const py = (s.y / s.z) * H/2 + cy;
      const r = (1-s.z) * 2;
      const op = (1-s.z) * 0.6;
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,229,255,${op})`;
      ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  tick();
})();

  grid.innerHTML = '';
  PROTOCOLS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.id = 'nav-' + p.id;
    btn.innerHTML = `<span class="layer-tag">L${p.layer}</span>${p.name}`;
    btn.onclick = () => loadProtocol(p.id);
    grid.appendChild(btn);
  });
}

function buildOSIStack() {
  const stack = document.getElementById('osi-stack');
  stack.innerHTML = '';
  [...OSI_LAYERS].reverse().forEach(l => {
    const el = document.createElement('div');
    el.className = 'osi-layer';
    el.id = 'osi-' + l.n;
    el.innerHTML = `<span class="osi-num">${l.n}</span><span class="osi-name">${l.name}</span><span class="osi-protos">${l.protos}</span>`;
    el.onclick = () => filterByLayer(l.n);
    stack.appendChild(el);
  });
}

function onSearch(e) {
  const q = e.target.value.toLowerCase();
  PROTOCOLS.forEach(p => {
    const btn = document.getElementById('nav-' + p.id);
    const match = p.name.toLowerCase().includes(q) ||
                  p.full.toLowerCase().includes(q) ||
                  p.ports.toLowerCase().includes(q) ||
                  p.layerName.toLowerCase().includes(q) ||
                  p.tags.some(t => t.includes(q));
    btn.style.display = match ? '' : 'none';
  });
}

function filterByLayer(n) {
  document.querySelectorAll('.osi-layer').forEach(l => l.classList.remove('active'));
  document.getElementById('osi-'+n).classList.add('active');
  const q = document.getElementById('search-bar');
  q.value = '';
  PROTOCOLS.forEach(p => {
    const btn = document.getElementById('nav-' + p.id);
    btn.style.display = p.layer === n ? '' : 'none';
  });
  logTerminal('t-note', `Filter: OSI Layer ${n}`);
}

// ─────────────────────────────────────────────────────────────────────
// LOAD PROTOCOL
// ─────────────────────────────────────────────────────────────────────
function loadProtocol(id) {
  const p = PROTOCOLS.find(x => x.id === id);
  if (!p) return;
  currentProto = p;
  quizIdx = 0;
  quizAnswered = false;
  hsStep = 0;
  activeField = null;
  currentTab = 'packet';
  visited.add(id);

  // Nav highlight
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-'+id).classList.add('active');

  // OSI highlight
  document.querySelectorAll('.osi-layer').forEach(l => l.classList.remove('active'));
  const ol = document.getElementById('osi-'+p.layer);
  if (ol) ol.classList.add('active');

  // Title
  document.getElementById('detail-title').textContent = p.name + '  //  ' + p.layerName + ' Layer';

  renderDetail();
  logTerminal('t-send', `LOAD ${p.name} — port ${p.ports}`);
  updateStats();
}

function renderDetail() {
  const p = currentProto;
  const body = document.getElementById('detail-body');

  const secColor = { 'high': 'var(--accent2)', 'medium': 'var(--warn)', 'low': 'var(--danger)', 'very-low': '#ff2222', 'critical': '#ff0000' };
  const secLabel = { 'high': 'SECURE', 'medium': 'MEDIUM', 'low': 'INSECURE', 'very-low': 'CRITICAL RISK', 'critical': 'CRITICAL' };

  const badgeHtml = p.tags.map(t => `<span class="badge badge-layer">${t}</span>`).join('') +
    `<span class="badge badge-port">:${p.ports}</span>` +
    `<span class="badge" style="background:rgba(${secColor[p.security].replace(/[^,\d]/g,',')},.1);color:${secColor[p.security]};border:1px solid;border-color:${secColor[p.security]}44">${secLabel[p.security]}</span>`;

  body.innerHTML = `
    <div class="proto-header">
      <div class="proto-name">${p.name}</div>
      <div class="proto-full">${p.full}</div>
      <div class="proto-badges">${badgeHtml}</div>
      <div class="proto-desc">${p.desc}</div>
    </div>
    <div class="tabs" id="tab-bar">
      <button class="tab active" data-tab="packet" onclick="switchTab('packet')">PACKET FORMAT</button>
      <button class="tab" data-tab="flow" onclick="switchTab('flow')">HANDSHAKE / FLOW</button>
      <button class="tab" data-tab="attacks" onclick="switchTab('attacks')">ATTACKS</button>
      <button class="tab" data-tab="quiz" onclick="switchTab('quiz')">QUIZ</button>
      <button class="tab" data-tab="compare" onclick="switchTab('compare')">COMPARE</button>
    </div>
    <div id="tab-content"></div>
  `;

  renderTab('packet');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  renderTab(tab);
}

function renderTab(tab) {
  const p = currentProto;
  const c = document.getElementById('tab-content');
  if (!c) return;

  if (tab === 'packet') {
    const colors = ['#0a2a3a','#0d1a2e','#1a0a2a','#0a2a1a','#2a0a0a','#2a1a0a','#050a0e'];
    const fields = p.fields;
    const totalBits = fields.length;
    const widths = fields.map(f => {
      if (f.bits.includes('∞') || f.bits === 'variable' || f.bits.length > 8) return 3;
      const n = parseInt(f.bits);
      if (!isNaN(n)) return Math.max(1, Math.round(n/16));
      return 1.5;
    });
    const total = widths.reduce((a,b)=>a+b,0);
    const pcts = widths.map(w => (w/total*100).toFixed(1)+'%');

    const fieldHtml = fields.map((f,i) => `
      <div class="pkt-field" id="pf-${i}" style="width:${pcts[i]};background:${f.color}" onclick="selectField(${i})">
        <span class="pkt-label">${f.name}</span>
        <span class="pkt-bits">${f.bits}</span>
      </div>`).join('');

    const fieldDetail = activeField !== null ? `
      <div class="field-detail">
        <h4>▶ ${fields[activeField].name}</h4>
        <p>${fields[activeField].desc}</p>
      </div>` : `
      <div class="field-detail">
        <h4>▶ Click a field above</h4>
        <p>Select any field in the packet diagram to see a detailed explanation of its purpose and how it is used in practice.</p>
      </div>`;

    c.innerHTML = `
      <div class="packet-viz">
        <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">${p.name} PACKET STRUCTURE</div>
        <div class="packet-row">${fieldHtml}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:4px">← Click any field for details</div>
      </div>
      ${fieldDetail}
      <div style="margin-top:16px">
        <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">Field Reference</div>
        <table class="compare-table">
          <tr><th>Field</th><th>Size</th><th>Purpose</th></tr>
          ${fields.map(f=>`<tr><td>${f.name}</td><td>${f.bits}</td><td style="color:var(--muted);font-size:11px">${f.desc.substring(0,80)}...</td></tr>`).join('')}
        </table>
      </div>`;

  } else if (tab === 'flow') {
    const hs = p.handshake;
    const steps = hs.steps;

    const timeline = steps.slice(0, hsStep+1).map((s,i) => {
      const isRight = s.from.includes('SERVER') || s.from.includes('AUTH') || s.from.includes('ROOT') || s.from.includes('TLD') || s.from.includes('RESOLVER') && i > 0;
      const arrow = isRight ? '←' : '→';
      return `
        <div class="hs-step visible" style="display:flex;align-items:center;gap:10px;margin-bottom:10px;animation:fadeIn 0.3s ease">
          <div style="width:90px;font-size:11px;color:var(--muted);text-align:right;flex-shrink:0">${s.from}</div>
          <div style="flex:1;text-align:center;position:relative">
            <div style="height:2px;background:${s.color};opacity:0.5;margin:10px 0"></div>
            <div style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:11px;color:${s.color};background:var(--bg);padding:0 8px;white-space:nowrap">${arrow} ${s.msg}</div>
          </div>
          <div style="width:90px;font-size:11px;color:var(--muted);flex-shrink:0">${s.to}</div>
        </div>`;
    }).join('');

    c.innerHTML = `
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">${hs.title}</div>
      <div id="hs-timeline" style="margin-bottom:16px">${timeline}</div>
      <div class="field-detail" id="hs-detail">
        <h4>▶ Step ${hsStep+1}/${steps.length}: ${steps[hsStep].msg}</h4>
        <p>${steps[hsStep].detail}</p>
      </div>
      <div class="step-controls">
        <button class="btn" onclick="hsNav(-1)">◀ PREV</button>
        <div class="step-counter">STEP ${hsStep+1} / ${steps.length}</div>
        <button class="btn btn-accent" onclick="hsNav(1)">NEXT ▶</button>
      </div>
      <div class="progress-bar" style="margin-top:12px">
        <div class="progress-fill" style="width:${((hsStep+1)/steps.length*100).toFixed(0)}%"></div>
      </div>`;

  } else if (tab === 'attacks') {
    const attacks = p.attacks;
    c.innerHTML = `
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">KNOWN ATTACK VECTORS</div>
      <div class="attack-grid">
        ${attacks.map(a=>`
          <div class="attack-card">
            <div class="attack-name">⚠ ${a.name}</div>
            <div class="attack-desc">${a.desc}</div>
          </div>`).join('')}
      </div>
      <div style="margin-top:16px">
        <div style="font-size:10px;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">SECURITY PROFILE</div>
        <table class="compare-table">
          <tr><th>Attribute</th><th>Value</th></tr>
          <tr><td>Layer</td><td>L${p.layer} — ${p.layerName}</td></tr>
          <tr><td>Default Port(s)</td><td>${p.ports}</td></tr>
          <tr><td>Authentication</td><td>${['high','medium'].includes(p.security)?'Yes':'None by default'}</td></tr>
          <tr><td>Encryption</td><td>${p.security==='high'?'✓ Encrypted':'✗ Plaintext'}</td></tr>
          <tr><td>Risk Level</td><td style="color:${p.security==='high'?'var(--accent2)':p.security==='medium'?'var(--warn)':'var(--danger)'}">${p.security.toUpperCase()}</td></tr>
        </table>
      </div>`;

  } else if (tab === 'quiz') {
    const qs = p.quiz;
    if (!qs || qs.length === 0) { c.innerHTML = '<div style="color:var(--muted);padding:20px">No quiz for this protocol yet.</div>'; return; }
    const q = qs[quizIdx];
    const keys = ['A','B','C','D'];
    c.innerHTML = `
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">QUIZ ${quizIdx+1} / ${qs.length} — ${p.name}</div>
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-options" id="quiz-opts">
        ${q.opts.map((o,i)=>`
          <button class="quiz-opt" id="qopt-${i}" onclick="answerQuiz(${i})">
            <span class="key">${keys[i]}</span>${o}
          </button>`).join('')}
      </div>
      <div class="quiz-feedback" id="quiz-fb"></div>
      <div class="step-controls">
        <button class="btn" onclick="prevQuiz()">◀ PREV</button>
        <div class="step-counter">Score: ${score}</div>
        <button class="btn" onclick="nextQuiz()">NEXT ▶</button>
      </div>`;

  } else if (tab === 'compare') {
    const same = PROTOCOLS.filter(x => x.layer === currentProto.layer && x.id !== currentProto.id);
    c.innerHTML = `
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">LAYER ${p.layer} PROTOCOLS — QUICK COMPARE</div>
      <table class="compare-table" style="margin-bottom:20px">
        <tr>
          <th>Protocol</th><th>Full Name</th><th>Port(s)</th><th>Security</th><th>Use Case</th>
        </tr>
        <tr style="background:rgba(0,229,255,0.04)">
          <td>→ ${p.name}</td><td style="color:var(--text);font-size:11px">${p.full}</td><td>${p.ports.split(',')[0]}</td>
          <td>${p.security}</td><td style="color:var(--muted);font-size:11px">${p.tags.join(', ')}</td>
        </tr>
        ${same.map(q=>`<tr>
          <td onclick="loadProtocol('${q.id}')" style="cursor:pointer">${q.name}</td>
          <td style="color:var(--text);font-size:11px">${q.full}</td>
          <td>${q.ports.split(',')[0]}</td>
          <td>${q.security}</td>
          <td style="color:var(--muted);font-size:11px">${q.tags.join(', ')}</td>
        </tr>`).join('')}
      </table>
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">ALL PROTOCOLS OVERVIEW</div>
      <table class="compare-table">
        <tr><th>Proto</th><th>Layer</th><th>Port</th><th>Security</th></tr>
        ${PROTOCOLS.map(q=>`
          <tr onclick="loadProtocol('${q.id}')" style="cursor:pointer;${q.id===p.id?'background:rgba(0,229,255,0.04)':''}">
            <td>${q.id===p.id?'→ ':''} ${q.name}</td>
            <td>${q.layer}</td><td>${q.ports.split(',')[0]}</td>
            <td style="color:${q.security==='high'?'var(--accent2)':q.security==='medium'?'var(--warn)':'var(--danger)'}">${q.security}</td>
          </tr>`).join('')}
      </table>`;
  }
}

// ─────────────────────────────────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────────────────────────────────
function selectField(i) {
  activeField = i;
  document.querySelectorAll('.pkt-field').forEach((el,j) => el.classList.toggle('active', j===i));
  const f = currentProto.fields[i];
  const fd = document.querySelector('.field-detail');
  if (fd) { fd.innerHTML = `<h4>▶ ${f.name} — ${f.bits}</h4><p>${f.desc}</p>`; }
  logTerminal('t-send', `FIELD: ${f.name} (${f.bits})`);
}

function hsNav(dir) {
  const steps = currentProto.handshake.steps;
  hsStep = Math.max(0, Math.min(steps.length-1, hsStep+dir));
  renderTab('flow');
  logTerminal('t-recv', `HS step ${hsStep+1}: ${steps[hsStep].msg}`);
}

function answerQuiz(i) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = currentProto.quiz[quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.disabled = true);
  opts[q.correct].classList.add('correct');
  const fb = document.getElementById('quiz-fb');
  fb.classList.add('show');
  if (i === q.correct) {
    opts[i].classList.add('correct');
    fb.className = 'quiz-feedback show ok';
    fb.innerHTML = '✓ CORRECT — ' + q.explain;
    score++;
    updateStats();
    logTerminal('t-recv', `Correct! +1 score`);
  } else {
    opts[i].classList.add('wrong');
    fb.className = 'quiz-feedback show bad';
    fb.innerHTML = '✗ INCORRECT — ' + q.explain;
    logTerminal('t-err', `Incorrect. Correct: ${q.opts[q.correct]}`);
  }
}

function nextQuiz() {
  const qs = currentProto.quiz;
  quizIdx = (quizIdx+1) % qs.length;
  quizAnswered = false;
  renderTab('quiz');
}
function prevQuiz() {
  const qs = currentProto.quiz;
  quizIdx = (quizIdx-1+qs.length) % qs.length;
  quizAnswered = false;
  renderTab('quiz');
}

// ─────────────────────────────────────────────────────────────────────
// TERMINAL LOG
// ─────────────────────────────────────────────────────────────────────
let logCount = 0;
function logTerminal(cls, msg) {
  const log = document.getElementById('terminal-log');
  const t = new Date();
  const ts = String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');
  const line = document.createElement('div');
  line.className = 'line';
  line.innerHTML = `<span class="t-time">[${ts}]</span> <span class="${cls}">${msg}</span>`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
  logCount++;
  if (logCount > 50) { log.removeChild(log.firstChild); }
}

function updateStats() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('proto-count').textContent = PROTOCOLS.length;
}

// ─────────────────────────────────────────────────────────────────────
// TOOLTIP
// ─────────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
document.addEventListener('mousemove', e => {
  tooltip.style.left = (e.clientX+12)+'px';
  tooltip.style.top  = (e.clientY+12)+'px';
});

// ─────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────
init();

// Auto-load first protocol after slight delay
setTimeout(() => {
  loadProtocol('tcp');
  logTerminal('t-note', 'Auto-loaded TCP. Explore all ' + PROTOCOLS.length + ' protocols.');
}, 400);
</script>
</body>
